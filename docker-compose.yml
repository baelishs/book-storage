services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: book-storage-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - book-storage-network
    depends_on:
      - mysql
    environment:
      - DB_HOST=mysql
      - DB_PORT=${DB_PORT:-3306}
      - DB_DATABASE=${DB_DATABASE:-book_storage}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-secret}

  nginx:
    image: nginx:alpine
    container_name: book-storage-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - book-storage-network
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: book-storage-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-book_storage}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_HOST: '%'
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - book-storage-network
    ports:
      - "3306:3306"

networks:
  book-storage-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
